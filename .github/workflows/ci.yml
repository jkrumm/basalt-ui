name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        # Built-in caching keyed on bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: oxlint config sync check
        run: bun packages/basalt-ui/scripts/gen-oxlint.ts --check

      - name: llms.txt sync check
        run: bun packages/basalt-ui/scripts/gen-llms.ts --check

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run fmt:check

      - name: Build package
        run: bun --filter basalt-ui build

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Theme guard (dogfood check-theme on basalt's own src)
        working-directory: packages/basalt-ui
        run: bun ./bin/basalt-ui.mjs check-theme

      - name: Coverage check (SURFACES projection gate)
        run: bun ./packages/basalt-ui/bin/basalt-ui.mjs check-coverage

      - name: Pack test (dist resolution gate)
        run: bun --filter basalt-ui pack-test
