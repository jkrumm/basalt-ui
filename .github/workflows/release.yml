name: Make Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes, just preview)"
        type: boolean
        default: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.new_release_version }}
      published: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }} # PAT as jkrumm — bypasses branch protection ruleset

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run semantic-release
        id: release
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node -r semantic-release-monorepo ./node_modules/.bin/semantic-release --dry-run
          else
            node -r semantic-release-monorepo ./node_modules/.bin/semantic-release
          fi

          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$NEW_TAG" != "$PREV_TAG" ] && [ "$NEW_TAG" != "none" ]; then
            VERSION=${NEW_TAG#v}
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "new_release_published=true" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }} # must be PAT — github-actions[bot] has no bypass rights
          MONOREPO_DIR: packages/basalt-ui
