name: Make Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes, just preview)"
        type: boolean
        default: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.new_release_version }}
      published: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }} # PAT as jkrumm — bypasses branch protection ruleset

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run semantic-release
        id: release
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node -r semantic-release-monorepo ./node_modules/.bin/semantic-release --dry-run
          else
            node -r semantic-release-monorepo ./node_modules/.bin/semantic-release
          fi

          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$NEW_TAG" != "$PREV_TAG" ] && [ "$NEW_TAG" != "none" ]; then
            VERSION=${NEW_TAG#v}
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "new_release_published=true" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }} # must be PAT — github-actions[bot] has no bypass rights
          MONOREPO_DIR: packages/basalt-ui

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true' && !inputs.dry_run
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package version matches tag
        working-directory: ./packages/basalt-ui
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${{ needs.release.outputs.version }}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PACKAGE_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $PACKAGE_VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        working-directory: ./packages/basalt-ui
        # --provenance: Sigstore attestation linking package to this commit + workflow.
        # --access public: required for unscoped packages.
        # NODE_AUTH_TOKEN: only needed until Trusted Publishing is configured on
        # npmjs.com (Settings → Trusted Publishers → Add GitHub Actions publisher).
        # Once configured, remove the NPM_TOKEN secret — OIDC takes over automatically.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build & Push Versioned Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true' && !inputs.dry_run
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: docker/login-action@v3
        with:
          registry: registry.jkrumm.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Get build metadata
        id: meta
        run: |
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push versioned image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/marketing/Dockerfile
          push: true
          tags: |
            registry.jkrumm.com/private/basalt-ui-marketing:${{ needs.release.outputs.version }}
            registry.jkrumm.com/private/basalt-ui-marketing:latest
          labels: |
            org.opencontainers.image.title=Basalt UI Marketing
            org.opencontainers.image.description=Documentation and design playground for the Basalt UI design system
            org.opencontainers.image.url=https://github.com/jkrumm/basalt-ui
            org.opencontainers.image.source=https://github.com/jkrumm/basalt-ui
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
          annotations: |
            manifest:org.opencontainers.image.title=Basalt UI Marketing
            manifest:org.opencontainers.image.description=Documentation and design playground for the Basalt UI design system
            manifest:org.opencontainers.image.url=https://github.com/jkrumm/basalt-ui
            manifest:org.opencontainers.image.source=https://github.com/jkrumm/basalt-ui
            manifest:org.opencontainers.image.version=${{ needs.release.outputs.version }}
            manifest:org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            manifest:org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
          cache-from: type=gha,scope=marketing
          cache-to: type=gha,mode=max,scope=marketing
