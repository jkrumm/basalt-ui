# basalt-ui consumer CI seed — placed at .github/workflows/check.yml by `basalt-ui init`,
# then owned by the consumer (sync never touches it again). Mirrors the basalt-ui gate
# order: frozen install -> lint + theme guard -> doctrine drift gate -> format check.
# `basalt-ui check-theme` is the palette guard shipped by basalt-ui (fails on raw
# color literals / off-identity accents that bypass the --vx-* token system).
# `basalt-ui sync --check` fails when the basalt-managed files (rules, skills, the
# CLAUDE block) have drifted from the installed basalt-ui version.
# The oxfmt globs below are rendered from `basalt.roots` at init time — this file is a
# template, not a raw copy, so a monorepo doesn't seed a `src/**` that matches nothing.
name: check
on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx oxlint .
      - run: bunx basalt-ui check-theme
      - run: bunx basalt-ui sync --check
      - run: bunx oxfmt {{ROOTS_GLOBS}} '!**/dist/**' --check
      # Enable once your app defines these package.json scripts:
      # - run: bun run typecheck
      # - run: bun run test
